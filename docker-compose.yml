services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: super
      POSTGRES_PASSWORD: super_pass
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U super -d postgres"]
      interval: 5s
      retries: 5

  setup:
    image: postgres:17
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./example/scripts:/scripts
    entrypoint: psql -U super -h db -d postgres -f /scripts/db_setup.sql
    environment:
      PGPASSWORD: super_pass

  app:
    build: .
      #context: .
      #dockerfile: Dockerfile
    depends_on:
      setup:
        condition: service_completed_successfully
    environment:
      DB_HOST: db
    ports:
      - "8080:8080"
    volumes:
      - ./example:/app/example